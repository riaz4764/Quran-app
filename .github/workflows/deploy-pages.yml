name: Deploy Quran App to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      # Web build assets ready karna
      - name: Build Web Application
        env:
          NODE_ENV: production
          EXPO_PUBLIC_BASE_URL: /Quran-app
        run: |
          if [ -d "artifacts/quran-app" ]; then
            pnpm --filter ./artifacts/quran-app run build || pnpm build
          else
            pnpm build
          fi

      - name: Upload Web Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: |
            artifacts/quran-app/dist
            artifacts/quran-app/out
            dist
            out
          if-no-files-found: warn

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
