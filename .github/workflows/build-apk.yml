name: Build Quran App Offline APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # Taake aap jab chahein manually bhi run kar sakein

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm' # Kyunki aap pnpm-lock.yaml use kar rahe ho

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Dependencies
        run: pnpm install

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Agar aap Expo/Capacitor use kar rahe hain, to yeh command unke mutabiq build nikalegi
      - name: Build Android App (Offline Package)
        run: |
          if [ -f "pnpm-workspace.yaml" ]; then
            pnpm build
          fi
          # Yahan system automatic platform android build run karega
          npx cap sync || true
          
      - name: Build Gradle APK
        run: |
          if [ -d "android" ]; then
            cd android && ./gradlew assembleDebug
          else
            echo "Android folder missing, building generic web-wrapper APK..."
            # Agar standalone build script package.json mein ho to wo execute hogi
            pnpm run build:android || true
          fi

      - name: Upload Offline APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Quran-App-Offline-Debug-APK
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            dist/*.apk
            *.apk
          if-no-files-found: warn
