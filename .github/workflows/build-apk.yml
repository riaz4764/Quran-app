name: Build Quran App Offline APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Step 1: Expo app ko build karenge aur static assets taiyar karenge
      - name: Build Android App Assets
        env:
          PORT: 3000
          BASE_PATH: /
          NODE_ENV: production
          REPLIT_INTERNAL_APP_DOMAIN: localhost
          REPLIT_DEV_DOMAIN: localhost
          EXPO_PUBLIC_DOMAIN: localhost
        run: |
          if [ -d "artifacts/quran-app" ]; then
            pnpm --filter ./artifacts/quran-app run build || pnpm build
          else
            pnpm build
          fi

      # Step 2: Native Android folder generate karenge (Expo Prebuild)
      - name: Generate Native Android Project
        run: |
          if [ -d "artifacts/quran-app" ]; then
            cd artifacts/quran-app
            npx expo prebuild --platform android --no-install || true
          else
            npx expo prebuild --platform android --no-install || true
          fi

      # Step 3: Gradle ke zariye real native Debug APK build karenge
      - name: Build Gradle APK
        run: |
          if [ -d "artifacts/quran-app/android" ]; then
            cd artifacts/quran-app/android && ./gradlew assembleDebug
          elif [ -d "android" ]; then
            cd android && ./gradlew assembleDebug
          else
            echo "Fallback: Checking if root gradle wrapper exists..."
            ./gradlew assembleDebug || echo "No android platform found to compile."
          fi

      # Step 4: Final APK file ko artifacts mein upload karenge
      - name: Upload Offline APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Quran-App-Offline-Debug-APK
          path: |
            artifacts/quran-app/android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
