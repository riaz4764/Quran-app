name: Build Quran App Offline APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Pure workspace ko build karne ke bajaye hum sirf main quran-app ko target kar rahe hain
      # Aur saare zaroori fallback env variables bhi de diye hain
      - name: Build Android App (Offline Package)
        env:
          PORT: 3000
          BASE_PATH: /
          NODE_ENV: production
        run: |
          if [ -d "artifacts/quran-app" ]; then
            echo "Targeting main Quran App workspace..."
            pnpm --filter ./artifacts/quran-app run build || pnpm build
          else
            pnpm build
          fi
          npx cap sync || true
          
      - name: Build Gradle APK
        run: |
          if [ -d "android" ]; then
            cd android && ./gradlew assembleDebug
          elif [ -d "artifacts/quran-app/android" ]; then
            cd artifacts/quran-app/android && ./gradlew assembleDebug
          else
            echo "Android folder missing, building generic web-wrapper APK..."
            pnpm run build:android || true
          fi

      - name: Upload Offline APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Quran-App-Offline-Debug-APK
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            artifacts/quran-app/android/app/build/outputs/apk/debug/app-debug.apk
            dist/*.apk
            *.apk
          if-no-files-found: warn
