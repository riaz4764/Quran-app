name: Build Quran App Offline APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Pnpm version ko latest par set kar diya taake catalogs feature support ho sake
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      # 2. Workspace project hone ki wajah se recursive install chalana behtar hai
      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android App (Offline Package)
        run: |
          if [ -f "pnpm-workspace.yaml" ]; then
            pnpm build
          fi
          npx cap sync || true
          
      - name: Build Gradle APK
        run: |
          if [ -d "android" ]; then
            cd android && ./gradlew assembleDebug
          else
            echo "Android folder missing, building generic web-wrapper APK..."
            pnpm run build:android || true
          fi

      - name: Upload Offline APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Quran-App-Offline-Debug-APK
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            dist/*.apk
            *.apk
          if-no-files-found: warn
